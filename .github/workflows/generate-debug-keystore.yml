name: Generate Debug Keystore (Run Once)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Debug Keystore
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Print SHA-1
        run: |
          echo "====== DEBUG SHA-1 (Firebase-এ যোগ করুন) ======"
          keytool -list -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android | grep "SHA1:"
          echo "================================================"

      - name: Print Base64 (SECRET হিসেবে সেভ করুন)
        run: |
          echo "====== নিচের BASE64 কপি করুন → GitHub Secret: DEBUG_KEYSTORE_BASE64 ======"
          base64 -w 0 ~/.android/debug.keystore
          echo ""
          echo "================================================"

name: Backend Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package.json

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Fix jest config path
        working-directory: backend
        run: |
          sed -i "s|src/__tests__|src/tests|g" jest.config.js
          echo "✅ jest.config.js path fixed"
          cat jest.config.js | grep testMatch

      - name: Run tests
        working-directory: backend
        env:
          NODE_ENV: test
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          JWT_PORTAL_SECRET: ${{ secrets.JWT_PORTAL_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          DB_HOST: ${{ secrets.TEST_DB_HOST }}
          DB_PORT: 5432
          DB_NAME: postgres
          DB_USER: ${{ secrets.TEST_DB_USER }}
          DB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
          TEST_MANAGER_EMAIL: ${{ secrets.TEST_MANAGER_EMAIL }}
          TEST_MANAGER_PASSWORD: ${{ secrets.TEST_MANAGER_PASSWORD }}
          TEST_WORKER_EMAIL: ${{ secrets.TEST_WORKER_EMAIL }}
          TEST_WORKER_PASSWORD: ${{ secrets.TEST_WORKER_PASSWORD }}
          TEST_WORKER_CODE: ${{ secrets.TEST_WORKER_CODE }}
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 7

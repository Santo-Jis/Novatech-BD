name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  permissions:
  contents: write
jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # ── Auto Version — github.run_number দিয়ে auto বাড়বে ──
      - name: Update version automatically
        run: |
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME="1.0.${{ github.run_number }}"

          # app.routes.js এ version update করো
          sed -i "s/versionCode: [0-9]*/versionCode: $VERSION_CODE/" backend/src/routes/app.routes.js
          sed -i "s/versionName: '[^']*'/versionName: '$VERSION_NAME'/" backend/src/routes/app.routes.js

          # useAppUpdate.js এ CURRENT_VERSION_CODE update করো
          sed -i "s/CURRENT_VERSION_CODE = [0-9]*/CURRENT_VERSION_CODE = $VERSION_CODE/" frontend/src/hooks/useAppUpdate.js

          echo "✅ Version updated: $VERSION_NAME (code: $VERSION_CODE)"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Create .env file
        working-directory: frontend
        run: |
          echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" > .env
          echo "VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}" >> .env
          echo "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" >> .env
          echo "VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}" >> .env
          echo "VITE_FIREBASE_DATABASE_URL=${{ secrets.VITE_FIREBASE_DATABASE_URL }}" >> .env
          echo "VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}" >> .env
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}" >> .env
          echo "VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}" >> .env
          echo "VITE_FIREBASE_VAPID_KEY=${{ secrets.VITE_FIREBASE_VAPID_KEY }}" >> .env

      - name: Build React app
        working-directory: frontend
        run: npm run build

      - name: Install Capacitor
        working-directory: frontend
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npm install @capacitor/push-notifications

      - name: Add Android & Sync
        working-directory: frontend
        run: |
          npx cap add android
          npx cap sync android

      - name: Build Debug APK
        working-directory: frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      # ── APK কে GitHub Release এ upload করো ─────────────────
      # এই URL থেকে App auto-download করবে
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: NovaTech BD v1.0.${{ github.run_number }}
          body: |
            ## NovaTech BD App Update
            **Version:** 1.0.${{ github.run_number }}
            **Build:** ${{ github.run_number }}
            
            ### পরিবর্তন
            - Latest code থেকে build করা হয়েছে
          files: frontend/android/app/build/outputs/apk/debug/app-debug.apk
        
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovaTech-BD-v1.0.${{ github.run_number }}
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

name: Build Android Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # ── Auto Version ──────────────────────────────────────────
      - name: Update version automatically
        run: |
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME="1.0.${{ github.run_number }}"

          # versionCode ও versionName আপডেট
          sed -i "s/versionCode: [0-9]*/versionCode: $VERSION_CODE/" backend/src/routes/app.routes.js
          sed -i "s/versionName: \'[^\']*\'/versionName: \'$VERSION_NAME\'/" backend/src/routes/app.routes.js

          # B2 filename আপডেট → NovaTech-BD-v1.0.X.apk
          sed -i "s/NovaTech-BD-v[0-9.]*\.apk/NovaTech-BD-v${VERSION_NAME}.apk/g" backend/src/routes/app.routes.js

          # frontend version আপডেট
          sed -i "s/CURRENT_VERSION_CODE = [0-9]*/CURRENT_VERSION_CODE = $VERSION_CODE/" frontend/src/hooks/useAppUpdate.js

          echo "✅ Version: $VERSION_NAME (code: $VERSION_CODE)"

      # ── Commit version bump so Render gets updated version ────
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/src/routes/app.routes.js frontend/src/hooks/useAppUpdate.js
          git diff --staged --quiet || git commit -m "chore: bump version to 1.0.${{ github.run_number }} [skip ci]"
          git pull --rebase origin main
          git push
          echo "✅ Version committed and pushed"

      # ── Frontend Dependencies ──────────────────────────────────
      - name: Install all frontend dependencies
        working-directory: frontend
        run: |
          npm install
          npm install --legacy-peer-deps \
            @capacitor/core \
            @capacitor/cli \
            @capacitor/android \
            @capacitor/push-notifications \
            @codetrix-studio/capacitor-google-auth@3.3.1

      # ── Environment Variables ──────────────────────────────────
      - name: Create .env file
        working-directory: frontend
        run: |
          echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" > .env
          echo "VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}" >> .env
          echo "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" >> .env
          echo "VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}" >> .env
          echo "VITE_FIREBASE_DATABASE_URL=${{ secrets.VITE_FIREBASE_DATABASE_URL }}" >> .env
          echo "VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}" >> .env
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}" >> .env
          echo "VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}" >> .env
          echo "VITE_FIREBASE_VAPID_KEY=${{ secrets.VITE_FIREBASE_VAPID_KEY }}" >> .env
          echo "VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}" >> .env

      # ── React Production Build ─────────────────────────────────
      - name: Build React app (production)
        working-directory: frontend
        run: npm run build

      # ── Capacitor Android ──────────────────────────────────────
      - name: Add Android & Sync
        working-directory: frontend
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android

      # ── google-services.json ───────────────────────────────────
      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" > frontend/android/app/google-services.json
          python3 -c "import json; json.load(open('frontend/android/app/google-services.json'))" \
            && echo "✅ google-services.json valid" \
            || (echo "❌ Invalid JSON" && exit 1)

      # ── Google Services Plugin ─────────────────────────────────
      - name: Verify google-services plugin in build.gradle
        working-directory: frontend/android
        run: |
          if ! grep -q "google-services" app/build.gradle; then
            sed -i "/apply plugin: 'com.android.application'/a apply plugin: 'com.google.gms.google-services'" app/build.gradle
          fi
          if ! grep -q "google-services" build.gradle; then
            sed -i "s/classpath 'com.android.tools.build:gradle/classpath 'com.google.gms:google-services:4.4.0'\n        classpath 'com.android.tools.build:gradle/" build.gradle
          fi
          echo "✅ build.gradle verified"

      # ── ProGuard Rules ─────────────────────────────────────────
      # Capacitor, Firebase, Google Auth — সব important class রক্ষা করা হয়েছে
      - name: Create ProGuard rules
        working-directory: frontend/android/app
        run: |
          cat > proguard-rules.pro << 'EOF'
          # ── Capacitor Core ──────────────────────────────────────
          -keep class com.getcapacitor.** { *; }
          -keep @com.getcapacitor.annotation.CapacitorPlugin class * { *; }

          # ── Firebase ────────────────────────────────────────────
          -keep class com.google.firebase.** { *; }
          -keep class com.google.android.gms.** { *; }
          -dontwarn com.google.firebase.**
          -dontwarn com.google.android.gms.**

          # ── Google Auth ─────────────────────────────────────────
          -keep class com.codetrixstudio.capacitor.GoogleAuth.** { *; }

          # ── WebView / JavaScript Bridge ─────────────────────────
          -keepclassmembers class * {
              @android.webkit.JavascriptInterface <methods>;
          }

          # ── Generic Android ─────────────────────────────────────
          -keepattributes *Annotation*
          -keepattributes SourceFile,LineNumberTable
          -keep public class * extends java.lang.Exception

          # ── OkHttp / Retrofit (যদি থাকে) ────────────────────────
          -dontwarn okhttp3.**
          -dontwarn okio.**
          EOF
          echo "✅ ProGuard rules created"

      # ── Release build.gradle Patch ────────────────────────────
      # buildTypes { release { ... } } এ ProGuard + minify enable করা হয়েছে
      - name: Enable ProGuard & minify in release buildType
        working-directory: frontend/android/app
        run: |
          python3 << 'PYEOF'
          import re

          with open("build.gradle", "r") as f:
              content = f.read()

          # release block-এ minifyEnabled false → true করো
          content = re.sub(
              r'(buildTypes\s*\{[^}]*release\s*\{[^}]*?)minifyEnabled\s+false',
              r'\1minifyEnabled true',
              content,
              flags=re.DOTALL
          )

          # যদি proguardFiles line না থাকে, add করো
          if "proguardFiles" not in content:
              content = re.sub(
                  r'(buildTypes\s*\{[^}]*release\s*\{[^}]*?minifyEnabled\s+true)',
                  r"\1\n            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'",
                  content,
                  flags=re.DOTALL
              )

          with open("build.gradle", "w") as f:
              f.write(content)

          print("✅ ProGuard enabled in release buildType")
          PYEOF

      # ── Keystore Setup ─────────────────────────────────────────
      # GitHub Secret-এ KEYSTORE_BASE64, KEY_ALIAS, KEY_PASSWORD,
      # STORE_PASSWORD রাখতে হবে।
      # Keystore তৈরি করতে → নিচের নোট দেখুন।
      - name: Setup Release Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > frontend/android/app/release.keystore
          echo "✅ Keystore decoded"

      # ── Signing Config Patch ───────────────────────────────────
      - name: Add signing config to build.gradle
        working-directory: frontend/android/app
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          python3 << 'PYEOF'
          import os, re

          key_alias     = os.environ["KEY_ALIAS"]
          key_password  = os.environ["KEY_PASSWORD"]
          store_password= os.environ["STORE_PASSWORD"]

          with open("build.gradle", "r") as f:
              content = f.read()

          signing_block = f"""
              signingConfigs {{
                  release {{
                      storeFile file("release.keystore")
                      storePassword "{store_password}"
                      keyAlias "{key_alias}"
                      keyPassword "{key_password}"
                  }}
              }}
          """

          # android {{ ... }} block-এর শুরুতে signingConfigs যোগ করো
          if "signingConfigs" not in content:
              content = re.sub(
                  r'(android\s*\{)',
                  r'\1' + signing_block,
                  content,
                  count=1
              )

          # release buildType-এ signingConfig reference যোগ করো
          if "signingConfig signingConfigs.release" not in content:
              content = re.sub(
                  r'(buildTypes\s*\{[^}]*release\s*\{[^}]*?minifyEnabled\s+true)',
                  r'\1\n            signingConfig signingConfigs.release',
                  content,
                  flags=re.DOTALL
              )

          with open("build.gradle", "w") as f:
              f.write(content)

          print("✅ Signing config added")
          PYEOF

      # ── Release APK Build ──────────────────────────────────────
      - name: Build Release APK
        working-directory: frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          echo "✅ Release APK built"

      # ── APK Path Confirm ──────────────────────────────────────
      - name: Confirm APK exists
        run: |
          APK_PATH="frontend/android/app/build/outputs/apk/release/app-release.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK found: $(du -sh $APK_PATH)"
          else
            echo "❌ APK not found!" && exit 1
          fi

      # ── GitHub Release ─────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: NovaTech BD v1.0.${{ github.run_number }}
          body: |
            ## NovaTech BD App Update
            **Version:** 1.0.${{ github.run_number }}
            **Build Type:** Release (ProGuard + Signed)
          files: frontend/android/app/build/outputs/apk/release/app-release.apk


      # ── Upload APK to Backblaze B2 ────────────────────────────
      # B2-তে upload করলে নিজের server থেকে serve হবে
      # GitHub CDN-এর বদলে b2.backblazeb2.com — scan কম হবে
      - name: Upload APK to Backblaze B2
        env:
          B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
          B2_BUCKET_NAME: ${{ secrets.B2_BUCKET_NAME }}
          B2_ENDPOINT: ${{ secrets.B2_ENDPOINT }}
        run: |
          APK_PATH="frontend/android/app/build/outputs/apk/release/app-release.apk"
          FILE_NAME="NovaTech-BD-v1.0.${{ github.run_number }}.apk"
          
          pip install b2sdk --quiet
          
          python3 << 'EOF'
          import os
          from b2sdk.v2 import InMemoryAccountInfo, B2Api
          
          info = InMemoryAccountInfo()
          api = B2Api(info)
          api.authorize_account("production", os.environ["B2_KEY_ID"], os.environ["B2_APPLICATION_KEY"])
          
          bucket = api.get_bucket_by_name(os.environ["B2_BUCKET_NAME"])
          
          apk_path = "frontend/android/app/build/outputs/apk/release/app-release.apk"
          file_name = f"NovaTech-BD-v1.0.${{ github.run_number }}.apk"
          
          # latest.apk নামেও রাখো — সবসময় এই URL কাজ করবে
          bucket.upload_local_file(local_file=apk_path, file_name="app-release.apk")
          bucket.upload_local_file(local_file=apk_path, file_name=file_name)
          
          print(f"✅ Uploaded: {file_name}")
          print(f"✅ Uploaded: app-release.apk")
          EOF

      # ── Artifact Upload ────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovaTech-BD-v1.0.${{ github.run_number }}-release
          path: frontend/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

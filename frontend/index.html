<!DOCTYPE html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="theme-color" content="#0F1B2E" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>ZovoriX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap"
      rel="stylesheet" media="print" onload="this.media='all'"
    />
    <!-- ZovoriX ব্র্যান্ড ডিজাইন সিস্টেম ফন্ট (ল্যান্ডিং পেইজ) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap"
      rel="stylesheet" media="print" onload="this.media='all'"
    />
    <!-- Customer Portal ডিজাইন সিস্টেম ফন্ট (Poppins + Inter) — শুধু কাস্টমার পোর্টালে ব্যবহৃত হবে (cp-head/cp-body ক্লাস দিয়ে) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet" media="print" onload="this.media='all'"
    />
    <style>
      #eruda { display: none !important; }
      body { margin: 0; }
    </style>

    <!-- ✅ STEP 1: Error catcher (ES module errors Android-এ silent হয়) -->
    <script>
      window.__STEP__ = 1; // HTML loaded

      window.onerror = function(msg, src, line, col, err) {
        var box = document.getElementById('__err__');
        if (box) {
          box.style.display = 'block';
          box.innerText = 'JS ERROR (step ' + window.__STEP__ + '):\n' + msg + '\nLine: ' + line + '\nFile: ' + src;
        }
      };
      window.addEventListener('unhandledrejection', function(e) {
        var box = document.getElementById('__err__');
        if (box) {
          box.style.display = 'block';
          box.innerText = 'PROMISE ERROR (step ' + window.__STEP__ + '):\n' + (e.reason && e.reason.message ? e.reason.message : String(e.reason));
        }
      });

      // ✅ ES module silent failure detector
      // React mount হলে #root-এ children আসে — না হলে 6s পর error দেখাবে
      setTimeout(function() {
        var root = document.getElementById('root');
        var err  = document.getElementById('__err__');
        if (err && err.style.display === 'none' && root && root.children.length === 0) {
          err.style.display = 'block';
          err.innerText =
            'React লোড হয়নি! (step ' + window.__STEP__ + ')\n\n' +
            'সম্ভাব্য কারণ: JS bundle লোড হয়নি।\n\n' +
            'URL: ' + window.location.href + '\n' +
            'Android: ' + (navigator.userAgent.match(/Android ([0-9.]+)/) || ['','?'])[1] + '\n' +
            'WebView: ' + (navigator.userAgent.match(/Chrome\/([0-9]+)/) || ['','?'])[1];
        }
      }, 6000);
    </script>
  </head>
  <body>
    <!-- Error overlay -->
    <div id="__err__" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#0a0f1a;color:#ff6b6b;padding:20px;font-size:13px;white-space:pre-wrap;z-index:99999;overflow:auto;font-family:monospace;"></div>

    <!--
      ✅ FIX: Loading screen এখন #root-এর ভেতরে আলাদা div-এ।
      আগে #root-এ সরাসরি style ছিল (display:flex, align-items:center),
      React mount হওয়ার পরেও সেটা থেকে যেত — ফলে সব screen
      পুরো width নিতে পারত না, দুই পাশে কালো gap দেখাত।
      এখন React mount হলে inner div টা replace হবে, #root clean থাকবে।
    -->
    <div id="root">
      <div style="position:fixed;inset:0;background:linear-gradient(160deg,#0F1B2E 0%,#16253D 55%,#0F1B2E 100%);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;z-index:1;">
        <svg width="88" height="88" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;">
          <defs>
            <filter id="zxGlow" x="-80%" y="-80%" width="260%" height="260%">
              <feGaussianBlur stdDeviation="2.4" result="blur"/>
              <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
            <linearGradient id="zxSpark" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#C99B5A" stop-opacity="0"/>
              <stop offset="50%" stop-color="#F7EFDD" stop-opacity="1"/>
              <stop offset="100%" stop-color="#C99B5A" stop-opacity="0"/>
            </linearGradient>
          </defs>

          <!-- স্থির ZovoriX লোগো চিহ্ন -->
          <line x1="77" y1="23" x2="23" y2="77" stroke="#22385c" stroke-width="9"/>
          <line x1="23" y1="23" x2="77" y2="77" stroke="#7a5426" stroke-width="9"/>
          <rect x="18" y="18" width="64" height="9" fill="#1c2f4d"/>
          <rect x="18" y="73" width="64" height="9" fill="#1c2f4d"/>

          <!-- লোগোর ভিতর দিয়ে প্রবাহিত বিদ্যুৎ -->
          <line class="zx-streak zx-streak-a" x1="77" y1="23" x2="23" y2="77" pathLength="100"
                stroke="url(#zxSpark)" stroke-width="9" stroke-linecap="round" filter="url(#zxGlow)"/>
          <line class="zx-streak zx-streak-b" x1="23" y1="23" x2="77" y2="77" pathLength="100"
                stroke="url(#zxSpark)" stroke-width="9" stroke-linecap="round" filter="url(#zxGlow)"/>
          <circle class="zx-spark-core" cx="50" cy="50" r="3.2" fill="#F7EFDD" filter="url(#zxGlow)" style="transform-origin:50px 50px;"/>
        </svg>
        <p style="color:#C99B5A;font-size:14px;font-family:'IBM Plex Sans','Noto Sans Bengali',sans-serif;letter-spacing:.03em;margin:0;">লোড হচ্ছে...</p>
        <style>
          .zx-streak{stroke-dasharray:20 300;animation:zxFlow 1.6s linear infinite;}
          .zx-streak-a{animation-delay:0s;}
          .zx-streak-b{animation-delay:.55s;}
          @keyframes zxFlow{
            0%{stroke-dashoffset:100;opacity:0;}
            8%{opacity:1;}
            88%{opacity:1;}
            100%{stroke-dashoffset:-32;opacity:0;}
          }
          .zx-spark-core{animation:zxPulse 1.6s ease-in-out infinite;}
          @keyframes zxPulse{
            0%,42%,100%{opacity:0;transform:scale(.6);}
            50%{opacity:1;transform:scale(1.35);}
            58%{opacity:0;transform:scale(.6);}
          }
        </style>
      </div>
    </div>

    <!-- Eruda debugger -->
    <script src="https://cdn.jsdelivr.net/npm/eruda" async></script>
    <script>
      window.addEventListener('load', function() {
        // ✅ FIX: main.jsx আগেই __STEP__=3 সেট করে।
        // load event সেটা overwrite না করুক — শুধু 3-এর নিচে থাকলে 2 সেট করো।
        if (window.__STEP__ < 3) window.__STEP__ = 2;
        try {
          if (typeof eruda !== 'undefined') {
            eruda.init();
            if (localStorage.getItem('user')) {
              document.getElementById('eruda').style.display = 'block';
            }
          }
        } catch(e) {}
      });
      window.__showEruda = function() {
        try { var el = document.getElementById('eruda'); if (el) el.style.display = 'block'; } catch(e) {}
      };
      window.__hideEruda = function() {
        try { var el = document.getElementById('eruda'); if (el) el.style.display = 'none'; } catch(e) {}
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="theme-color" content="#1e3a8a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>NovaTech BD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* লগইনের আগে Eruda বাটন সম্পূর্ণ লুকিয়ে রাখো */
      #eruda { display: none !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="//cdn.jsdelivr.net/npm/eruda" async></script>
    <script>
      // async script load হওয়ার পর init করো — না হলে error
      window.addEventListener('load', function() {
        try {
          if (typeof eruda !== 'undefined') {
            eruda.init();
            // user localStorage-এ থাকলে দেখাও (token memory-তে থাকে, user localStorage-এ)
            if (localStorage.getItem('user')) {
              document.getElementById('eruda').style.display = 'block';
            }
          }
        } catch(e) { /* eruda failed — কোনো সমস্যা নেই */ }
      });

      window.__showEruda = function() {
        try {
          var el = document.getElementById('eruda');
          if (el) el.style.display = 'block';
        } catch(e) {}
      };
      window.__hideEruda = function() {
        try {
          var el = document.getElementById('eruda');
          if (el) el.style.display = 'none';
        } catch(e) {}
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
